name: News Update Cron

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger News Update
        run: |
          curl -X GET "https://guaraponews.vercel.app/api/cron?secret=${{ secrets.CRON_SECRET }}"
